[tools]
node = "23.7.0"

[tasks.install]
description = "Install dependencies"
run = "npm ci"

[tasks.typecheck]
description = "Run TypeScript type check"
run = "npm run typecheck"

[tasks.test]
description = "Run tests"
run = "npm test"

[tasks.setup]
description = "Create Notion databases and configure .env"
run = "npm run setup"

[tasks.standup]
description = "Run the standup agent via Notion MCP (--verbose for live output, --dry-run to preview)"
run = "node_modules/.bin/tsx scripts/run-mcp.ts"

[tasks.digest]
description = "Generate the weekly digest via Notion MCP (--verbose for live output, --dry-run to preview)"
run = "node_modules/.bin/tsx scripts/run-digest.ts"

[tasks.seed-week]
description = "Seed standup pages into Notion (--week -1 for last week, --week -2 for two weeks ago)"
run = "node_modules/.bin/tsx scripts/seed-week.ts"

[tasks.start]
description = "Start the scheduler (daily standups + Friday digest)"
run = "npm start"

[tasks.evolve-tasks]
description = "Run intelligent task evolution system (--dry-run to preview, --verbose for details)"
run = "node_modules/.bin/tsx scripts/evolve-tasks.ts"
