name: Weekly Digest Generation

on:
  schedule:
    # Run at 5 PM EST (22:00 UTC) on Fridays
    - cron: '0 22 * * 5'
  
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      week_offset:
        description: 'Week offset (0 = current week, -1 = last week)'
        required: false
        default: '0'
        type: string
      verbose:
        description: 'Run with verbose output'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'Run in dry-run mode (no writes to Notion)'
        required: false
        default: 'false'
        type: boolean

jobs:
  digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run install

      - name: Run TypeScript type check
        run: mise run typecheck

      - name: Generate weekly digest
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.week_offset }}" != "" ] && [ "${{ github.event.inputs.week_offset }}" != "0" ]; then
            ARGS="$ARGS --week ${{ github.event.inputs.week_offset }}"
          fi
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          mise run digest $ARGS
        env:
          # Required environment variables
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TASK_DB_ID: ${{ secrets.NOTION_TASK_DB_ID }}
          NOTION_STANDUP_LOG_DB_ID: ${{ secrets.NOTION_STANDUP_LOG_DB_ID }}
          NOTION_SYSTEM_STATUS_DB_ID: ${{ secrets.NOTION_SYSTEM_STATUS_DB_ID }}
          
          # Optional environment variables with defaults
          TZ: 'America/New_York'
          
          # Optional integrations
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Report status on failure
        if: failure()
        run: |
          echo "::error::Weekly digest generation failed"
          echo "::error::Check the logs above for details"